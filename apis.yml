apis:
  - aid: customs-and-border-protection:apis-eapis
    name: APIS / eAPIS
    description: >-
      The Advance Passenger Information System (APIS) collects pre-arrival
      and pre-departure manifest data on all passengers and crew members
      flown or sailed into and out of the United States. The eAPIS web
      portal allows commercial operators and private aircraft and vessel
      operators to create, manage, and submit APIS manifests. Bulk and
      partner integrations use UN/EDIFACT PAXLST and CUSRES messages over
      CBP-approved transmission methods.
    image: https://kinlane-productions2.s3.amazonaws.com/apis-json/apis-json-logo.jpg
    humanURL: https://www.cbp.gov/travel/travel-industry-personnel/advance-passenger-information-system
    baseURL: https://eapis.cbp.dhs.gov/
    tags:
      - APIS
      - Border Security
      - Crew
      - eAPIS
      - Manifests
      - Passengers
    properties:
      - type: Documentation
        url: https://www.cbp.gov/travel/travel-industry-personnel/advance-passenger-information-system
      - type: Portal
        url: https://eapis.cbp.dhs.gov/
      - type: FactSheet
        url: https://www.cbp.gov/sites/default/files/assets/documents/2019-Sep/APIS-Fact-Sheet-2019.pdf
  - aid: customs-and-border-protection:ace
    name: Automated Commercial Environment (ACE)
    description: >-
      ACE is the U.S. Single Window through which the trade community
      reports imports and exports and CBP and Partner Government Agencies
      determine admissibility. Trade users access ACE via the ACE Secure
      Data Portal (a free web-based interface) and via ACE Electronic Data
      Interchange (EDI), which uses CBP-approved CAMIR/AESTIR messaging
      standards. The ACE Portal modernization program completed user
      access management migration in February 2025.
    image: https://kinlane-productions2.s3.amazonaws.com/apis-json/apis-json-logo.jpg
    humanURL: https://www.cbp.gov/trade/automated
    baseURL: https://ace.cbp.dhs.gov/
    tags:
      - ACE
      - Admissibility
      - Cargo
      - EDI
      - Imports
      - PGA
      - Single Window
    properties:
      - type: Documentation
        url: https://www.cbp.gov/trade/automated
      - type: GettingStarted
        url: https://www.cbp.gov/trade/automated/how-to-use-ace
      - type: Portal
        url: https://ace.cbp.dhs.gov/
      - type: Modernization
        url: https://www.cbp.gov/trade/automated/ace-deployments/ace-portal-modernization
      - type: Deployments
        url: https://www.cbp.gov/trade/automated/ace-deployments
  - aid: customs-and-border-protection:aes
    name: Automated Export System (AES)
    description: >-
      AES is the system through which exporters file Electronic Export
      Information (EEI) for goods leaving the United States. AES is
      integrated with ACE and supports both EDI filings and the AESDirect
      web filing tool. AESDirect is the free web-based filing application
      offered by CBP to file EEI directly into AES.
    image: https://kinlane-productions2.s3.amazonaws.com/apis-json/apis-json-logo.jpg
    humanURL: https://www.cbp.gov/trade/aes
    baseURL: https://ace.cbp.dhs.gov/
    tags:
      - AES
      - AESDirect
      - EEI
      - Exports
      - Filings
    properties:
      - type: Documentation
        url: https://www.cbp.gov/trade/aes
      - type: AESDirect
        url: https://www.cbp.gov/trade/aes/aesdirect
  - aid: customs-and-border-protection:aesdirect-weblink-inquiry-api
    name: AESDirect WebLink Inquiry API
    description: >-
      The AESDirect WebLink Inquiry API allows authorized partners to
      programmatically query AESDirect filings. CBP provides separate
      certification (test) and production environments for the API. This
      is one of the few directly exposed web APIs in CBP's trade portfolio.
    image: https://kinlane-productions2.s3.amazonaws.com/apis-json/apis-json-logo.jpg
    humanURL: https://www.cbp.gov/trade/automated/aesdirect-weblink-inquiry-api
    baseURL: https://ace.cbp.dhs.gov/
    tags:
      - AES
      - AESDirect
      - Filings
      - Inquiry
      - WebLink
    properties:
      - type: Documentation
        url: https://www.cbp.gov/trade/automated/aesdirect-weblink-inquiry-api
  - aid: customs-and-border-protection:acas
    name: Air Cargo Advance Screening (ACAS)
    description: >-
      ACAS requires inbound air carriers and other eligible parties to
      submit advance air cargo data to CBP for security risk-based
      screening prior to loading on aircraft destined for the United
      States. ACAS data is transmitted via CBP-approved EDI messages.
    image: https://kinlane-productions2.s3.amazonaws.com/apis-json/apis-json-logo.jpg
    humanURL: https://www.cbp.gov/border-security/ports-entry/cargo-security/acas
    baseURL: https://ace.cbp.dhs.gov/
    tags:
      - ACAS
      - Advance Data
      - Air Cargo
      - Pre-loading
      - Security
    properties:
      - type: Documentation
        url: https://www.cbp.gov/border-security/ports-entry/cargo-security/acas
