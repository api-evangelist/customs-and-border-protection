aid: customs-and-border-protection
name: Customs and Border Protection
kind: government
description: >-
  U.S. Customs and Border Protection (CBP) is the federal law enforcement
  agency within the Department of Homeland Security responsible for
  apprehending individuals attempting to enter the United States illegally,
  stemming the flow of illegal drugs and contraband, protecting agricultural
  and economic interests from harmful pests and diseases, protecting
  intellectual property, and regulating and facilitating international trade,
  collecting import duties, and enforcing U.S. trade laws. CBP's primary
  trade automation systems are the Automated Commercial Environment (ACE),
  the Automated Export System (AES), AESDirect, the Advance Passenger
  Information System (APIS / eAPIS), and the Air Cargo Advance Screening
  (ACAS) program. Trade integrations are predominantly delivered through
  Electronic Data Interchange (EDI) messaging via ACE, with a small set of
  CBP web services (e.g., the AESDirect WebLink Inquiry API) exposed for
  programmatic use.
